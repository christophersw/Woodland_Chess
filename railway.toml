[build]
builder = "NIXPACKS"
buildCommand = "pip install --upgrade pip && pip install ."

[deploy]
startCommand = "streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port ${PORT:-8501} --server.headless true"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 120
