{% load static %}
<nav class="w-56 bg-forest text-parchment flex flex-col py-6 px-4 shrink-0">
  <div class="mb-8">
    <span class="font-display text-xl tracking-wide">Wood League</span>
    <span class="block font-mono text-xs text-moss mt-1">Chess Analytics</span>
  </div>

  <ul class="space-y-1 flex-1">
    <li>
      <a href="{% url 'dashboard:index' %}"
         class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-moss transition-colors
                {% if request.resolver_match.namespace == 'dashboard' %}bg-moss font-semibold{% endif %}">
        Dashboard
      </a>
    </li>
    <li>
      <a href="{% url 'search:index' %}"
         class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-moss transition-colors
                {% if request.resolver_match.namespace == 'search' %}bg-moss font-semibold{% endif %}">
        Game Search
      </a>
    </li>

    {% if user.is_authenticated and user.role == 'admin' %}
    <li class="mt-6">
      <span class="px-3 text-xs font-mono uppercase tracking-widest text-moss">Admin</span>
    </li>
    <li>
      <a href="{% url 'players:members' %}"
         class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-moss transition-colors
                {% if request.resolver_match.namespace == 'players' %}bg-moss font-semibold{% endif %}">
        Club Members
      </a>
    </li>
    <li>
      <a href="{% url 'analysis:status' %}"
         class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-moss transition-colors
                {% if request.resolver_match.namespace == 'analysis' %}bg-moss font-semibold{% endif %}">
        Analysis Status
      </a>
    </li>
    {% endif %}
  </ul>

  {% if user.is_authenticated %}
  <div class="mt-auto pt-4 border-t border-moss">
    <span class="block text-xs font-mono text-moss truncate">{{ user.email }}</span>
    <form method="post" action="{% url 'accounts:logout' %}" class="mt-2">
      {% csrf_token %}
      <button type="submit" class="text-xs text-parchment hover:text-white font-mono">Sign out</button>
    </form>
  </div>
  {% endif %}
</nav>
