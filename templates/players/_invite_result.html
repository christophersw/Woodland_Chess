{# Replaces the invite popover on success #}
<div id="invite-popover-{{ player.pk }}" class="w-64 bg-parchment border border-moss p-4 shadow-lg">
  <p class="font-mono text-xs text-moss font-bold mb-1">Login created</p>
  <p class="font-mono text-xs text-slate">{{ email }}</p>
  <p class="font-mono text-xs text-slate mt-1">Ask {{ player.display_name }} to log in and change their password.</p>
</div>
