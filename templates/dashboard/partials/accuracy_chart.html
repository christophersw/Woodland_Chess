{% if empty %}
<p class="font-mono text-sm text-slate py-4">No analysed games found for this period.</p>
{% else %}
<div id="accuracy-chart" style="height:380px;"></div>
<script>
(function() {
  var data = {{ chart_json|safe }};
  Plotly.react("accuracy-chart", data.data, data.layout, {responsive: true, displaylogo: false});
})();
</script>
{% endif %}
